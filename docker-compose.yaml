services:
  northwind-db:
    image: postgres:15
    container_name: northwind-db

    environment:
      POSTGRES_USER: ${NORTHWIND_DB_USER}
      POSTGRES_PASSWORD: ${NORTHWIND_DB_PASSWORD}
      POSTGRES_DB: ${NORTHWIND_DB_NAME}

    ports:
      - "${NORTHWIND_DB_PORT}:5432"

    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - data-network

  metastore-db:
    image: postgres:15
    container_name: metastore-db

    environment:
      POSTGRES_DB: ${METASTORE_DB_NAME}
      POSTGRES_USER: ${METASTORE_DB_USER}
      POSTGRES_PASSWORD: ${METASTORE_DB_PASSWORD}

    ports:
      - "${METASTORE_DB_PORT}:5432"

    networks:
      - data-network

  minio:
    image: minio/minio
    container_name: minio

    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"

    networks:
      - data-network

  create-minio-bucket:
    image: minio/mc
    container_name: create-minio-bucket

    depends_on:
      - minio

    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set myminio ${MINIO_ENDPOINT} ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};

      /usr/bin/mc mb myminio/warehouse --ignore-existing;

      echo 'MinIO warehouse bucket created successfully';
      "

    networks:
      - data-network

  hive-metastore:
    image: starburstdata/hive:3.1.2-e.18
    container_name: hive-metastore
    hostname: hive-metastore

    environment:
      HIVE_METASTORE_DRIVER: org.postgresql.Driver

      HIVE_METASTORE_JDBC_URL: jdbc:postgresql://metastore-db:5432/${METASTORE_DB_NAME}

      HIVE_METASTORE_USER: ${METASTORE_DB_USER}
      HIVE_METASTORE_PASSWORD: ${METASTORE_DB_PASSWORD}

      HIVE_METASTORE_WAREHOUSE_DIR: ${HIVE_WAREHOUSE_DIR}

      HIVE_METASTORE_USERS_IN_ADMIN_ROLE: admin

      S3_ENDPOINT: ${MINIO_ENDPOINT}
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      S3_SECRET_KEY: ${MINIO_SECRET_KEY}
      S3_PATH_STYLE_ACCESS: "true"

      REGION: ""
      GOOGLE_CLOUD_KEY_FILE_PATH: ""
      AZURE_ADL_CLIENT_ID: ""
      AZURE_ADL_CREDENTIAL: ""
      AZURE_ADL_REFRESH_URL: ""
      AZURE_ABFS_STORAGE_ACCOUNT: ""
      AZURE_ABFS_ACCESS_KEY: ""
      AZURE_WASB_STORAGE_ACCOUNT: ""
      AZURE_ABFS_OAUTH: ""
      AZURE_ABFS_OAUTH_TOKEN_PROVIDER: ""
      AZURE_ABFS_OAUTH_CLIENT_ID: ""
      AZURE_ABFS_OAUTH_SECRET: ""
      AZURE_ABFS_OAUTH_ENDPOINT: ""
      AZURE_WASB_ACCESS_KEY: ""

      HIVE_METASTORE_PORT_EXPOSE: ${HIVE_METASTORE_PORT}

    ports:
      - "${HIVE_METASTORE_PORT}:9083"

    volumes:
      - ./docker/hive/hive-site.xml:/opt/hive-metastore/conf/hive-site.xml
    depends_on:
      - metastore-db
      - minio
      - create-minio-bucket

    networks:
      - data-network

  spark:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile

    container_name: spark-lakehouse

    command: tail -f /dev/null

    depends_on:
      - northwind-db
      - hive-metastore
      - minio
      - create-minio-bucket

    ports:
      - "${SPARK_UI_PORT}:4040"
      - "${SPARK_MASTER_PORT}:8080"

    volumes:
      - ./docker/spark/spark-app:/opt/spark-app
      - ./docker/spark/spark-config:/opt/bitnami/spark/conf
      - ./docker/spark/spark-config/core-site.xml:/opt/spark/conf/core-site.xml
      - ./docker/spark/spark-config/hive-site.xml:/opt/spark/conf/hive-site.xml

    networks:
      - data-network

  spark-thrift-server:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile

    container_name: spark-thrift-server

    command: >
      /opt/spark/bin/spark-submit
      --class org.apache.spark.sql.hive.thriftserver.HiveThriftServer2
      --master local[*]
      /opt/spark/jars/spark-hive-thriftserver_2.12-3.5.0.jar

    depends_on:
      - hive-metastore
      - minio

    ports:
      - "10000:10000"
      - "4041:4040"

    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      AWS_REGION: us-east-1

    networks:
      - data-network

  dbt:
    build:
      context: ./docker/dbt
      dockerfile: Dockerfile
    image: e2e-dbt:1.11.11
    container_name: dbt
    volumes:
      - ./dbt:/usr/app
      - ./docker/dbt/start.sh:/usr/local/bin/start.sh
    working_dir: /usr/app
    entrypoint: ["/bin/sh", "/usr/local/bin/start.sh"]
    networks:
      - data-network


networks:
  data-network: