  groq-agent:
    build:
      context: ./docker/agent
      dockerfile: Dockerfile
    image: e2elakehouse-groq-agent:latest
    container_name: groq-agent
    env_file:
      - .env
    environment:
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      TRINO_USER: groq_agent
      TRINO_CATALOG: iceberg
      TRINO_SCHEMA: gold
    depends_on:
      - trino
      - minio
    networks:
      - data-network
    stdin_open: true
    tty: true
