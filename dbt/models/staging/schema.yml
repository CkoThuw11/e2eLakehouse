version: 2

sources:
  - name: bronze
    schema: bronze
    tables:
      - name: orders
      - name: customers
      - name: products
      - name: order_details
      - name: categories
      - name: employees
      - name: suppliers

models:
  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null

  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: stg_products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: stg_order_details
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null

  - name: stg_categories
    columns:
      - name: category_id
        tests:
          - unique
          - not_null
      - name: category_name
        tests:
          - not_null

  - name: stg_employees
    columns:
      - name: employee_id
        tests:
          - unique
          - not_null

  - name: stg_suppliers
    columns:
      - name: supplier_id
        tests:
          - unique
          - not_null